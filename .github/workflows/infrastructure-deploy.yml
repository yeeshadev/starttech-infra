name: Infrastructure Deploy

on:
  push:
    branches: [master, main]
    paths:
      - 'terraform/**'
      - '.github/workflows/infrastructure-deploy.yml'
  pull_request:
    branches: [master, main]
    paths:
      - 'terraform/**'
  workflow_dispatch:
    inputs:
      action:
        description: 'Terraform action to run'
        required: true
        default: 'plan'
        type: choice
        options: [plan, apply, destroy]

permissions:
  contents: read
  pull-requests: write

env:
  TF_VERSION: '1.9.0'
  WORKING_DIR: './terraform'
  STATE_BUCKET: 'muchtodo-terraform-state'
  STATE_TABLE: 'muchtodo-terraform-locks'
  STATE_REGION: 'eu-north-1'

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION || 'eu-north-1' }}
        run: terraform init -backend=false

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        run: terraform validate

  plan:
    name: Plan
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'pull_request' || github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION || 'eu-north-1' }}
      TF_VAR_mongo_uri: ${{ secrets.TF_VAR_MONGO_URI }}
      TF_VAR_jwt_secret_key: ${{ secrets.TF_VAR_JWT_SECRET_KEY }}
      TF_VAR_redis_password: ${{ secrets.TF_VAR_REDIS_PASSWORD }}
      TF_VAR_alert_email: ${{ secrets.ALERT_EMAIL }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Bootstrap state backend
        run: |
          # Create S3 bucket (idempotent)
          if aws s3api head-bucket --bucket "$STATE_BUCKET" 2>/dev/null; then
            echo "State bucket already exists: $STATE_BUCKET"
          else
            aws s3api create-bucket \
              --bucket "$STATE_BUCKET" \
              --region "$STATE_REGION" \
              --create-bucket-configuration LocationConstraint="$STATE_REGION"
            aws s3api put-bucket-versioning \
              --bucket "$STATE_BUCKET" \
              --versioning-configuration Status=Enabled
            aws s3api put-bucket-encryption \
              --bucket "$STATE_BUCKET" \
              --server-side-encryption-configuration \
              '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}'
            echo "Created state bucket: $STATE_BUCKET"
          fi

          # Create DynamoDB lock table (idempotent)
          if aws dynamodb describe-table --table-name "$STATE_TABLE" --region "$STATE_REGION" 2>/dev/null; then
            echo "Lock table already exists: $STATE_TABLE"
          else
            aws dynamodb create-table \
              --table-name "$STATE_TABLE" \
              --attribute-definitions AttributeName=LockID,AttributeType=S \
              --key-schema AttributeName=LockID,KeyType=HASH \
              --billing-mode PAY_PER_REQUEST \
              --region "$STATE_REGION"
            echo "Created lock table: $STATE_TABLE"
          fi

      - name: Terraform Init
        run: terraform init

      - name: Import orphaned resources
        run: |
          set -euo pipefail
          PREFIX="muchtodo-production"

          # Clear any stale state lock left by a previously crashed run
          aws dynamodb delete-item \
            --table-name "$STATE_TABLE" \
            --region "$STATE_REGION" \
            --key "{\"LockID\": {\"S\": \"${STATE_BUCKET}/production/terraform.tfstate\"}}" \
            2>/dev/null || true

          import_if_missing() {
            local resource="$1" id="$2"
            if [ -z "$id" ] || [ "$id" = "None" ]; then
              echo "Skip $resource — not found in AWS"
              return
            fi
            if terraform state show "$resource" >/dev/null 2>&1; then
              echo "OK (in state): $resource"
            else
              echo "Importing: $resource"
              # -lock=false: imports are single-step writes; avoids stale locks on failure
              terraform import -lock=false "$resource" "$id" \
                || echo "WARN: import failed for $resource"
            fi
          }

          # ── Networking ──────────────────────────────────────────────────────
          VPC_ID=$(aws ec2 describe-vpcs \
            --filters "Name=tag:Name,Values=${PREFIX}-vpc" \
            --query "Vpcs[0].VpcId" --output text 2>/dev/null || true)
          import_if_missing "module.networking.aws_vpc.main" "$VPC_ID"

          IGW_ID=$(aws ec2 describe-internet-gateways \
            --filters "Name=tag:Name,Values=${PREFIX}-igw" \
            --query "InternetGateways[0].InternetGatewayId" --output text 2>/dev/null || true)
          import_if_missing "module.networking.aws_internet_gateway.main" "$IGW_ID"

          RT_ID=$(aws ec2 describe-route-tables \
            --filters "Name=tag:Name,Values=${PREFIX}-public-rt" \
            --query "RouteTables[0].RouteTableId" --output text 2>/dev/null || true)
          import_if_missing "module.networking.aws_route_table.public" "$RT_ID"

          # Public subnets — look up by exact CIDR (matches var.public_subnet_cidrs defaults)
          # so we never try to import more subnets than the config defines
          PUBLIC_CIDRS=("10.0.1.0/24" "10.0.2.0/24")
          for i in "${!PUBLIC_CIDRS[@]}"; do
            SUB_ID=$(aws ec2 describe-subnets \
              --filters "Name=vpc-id,Values=${VPC_ID}" \
                        "Name=cidr-block,Values=${PUBLIC_CIDRS[$i]}" \
              --query "Subnets[0].SubnetId" --output text 2>/dev/null || true)
            import_if_missing "module.networking.aws_subnet.public[$i]" "$SUB_ID"
            if [ -n "$RT_ID" ] && [ "$RT_ID" != "None" ] && \
               [ -n "$SUB_ID" ] && [ "$SUB_ID" != "None" ]; then
              ASSOC_ID=$(aws ec2 describe-route-tables \
                --route-table-ids "$RT_ID" \
                --query "RouteTables[0].Associations[?SubnetId=='${SUB_ID}'].RouteTableAssociationId" \
                --output text 2>/dev/null || true)
              import_if_missing \
                "module.networking.aws_route_table_association.public[$i]" "$ASSOC_ID"
            fi
          done

          # Private subnets — same approach with exact CIDRs
          PRIVATE_CIDRS=("10.0.10.0/24" "10.0.11.0/24")
          for i in "${!PRIVATE_CIDRS[@]}"; do
            SUB_ID=$(aws ec2 describe-subnets \
              --filters "Name=vpc-id,Values=${VPC_ID}" \
                        "Name=cidr-block,Values=${PRIVATE_CIDRS[$i]}" \
              --query "Subnets[0].SubnetId" --output text 2>/dev/null || true)
            import_if_missing "module.networking.aws_subnet.private[$i]" "$SUB_ID"
          done

          ALB_SG=$(aws ec2 describe-security-groups \
            --filters "Name=tag:Name,Values=${PREFIX}-alb-sg" \
            --query "SecurityGroups[0].GroupId" --output text 2>/dev/null || true)
          import_if_missing "module.networking.aws_security_group.alb" "$ALB_SG"

          BACKEND_SG=$(aws ec2 describe-security-groups \
            --filters "Name=tag:Name,Values=${PREFIX}-backend-sg" \
            --query "SecurityGroups[0].GroupId" --output text 2>/dev/null || true)
          import_if_missing "module.networking.aws_security_group.backend" "$BACKEND_SG"

          REDIS_SG=$(aws ec2 describe-security-groups \
            --filters "Name=tag:Name,Values=${PREFIX}-redis-sg" \
            --query "SecurityGroups[0].GroupId" --output text 2>/dev/null || true)
          import_if_missing "module.networking.aws_security_group.redis" "$REDIS_SG"

          # ── Compute ─────────────────────────────────────────────────────────
          import_if_missing "module.compute.aws_iam_role.ec2" \
            "${PREFIX}-ec2-role"
          import_if_missing "module.compute.aws_iam_role_policy_attachment.ecr_read" \
            "${PREFIX}-ec2-role/arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryReadOnly"
          import_if_missing "module.compute.aws_iam_role_policy_attachment.cloudwatch_agent" \
            "${PREFIX}-ec2-role/arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy"
          import_if_missing "module.compute.aws_iam_role_policy_attachment.ssm" \
            "${PREFIX}-ec2-role/arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore"
          import_if_missing "module.compute.aws_iam_instance_profile.ec2" \
            "${PREFIX}-ec2-profile"

          LT_ID=$(aws ec2 describe-launch-templates \
            --query "LaunchTemplates[?starts_with(LaunchTemplateName,'${PREFIX}-lt-')].LaunchTemplateId|[0]" \
            --output text 2>/dev/null || true)
          import_if_missing "module.compute.aws_launch_template.backend" "$LT_ID"

          ALB_ARN=$(aws elbv2 describe-load-balancers \
            --names "${PREFIX}-alb" \
            --query "LoadBalancers[0].LoadBalancerArn" --output text 2>/dev/null || true)
          import_if_missing "module.compute.aws_lb.backend" "$ALB_ARN"

          TG_ARN=$(aws elbv2 describe-target-groups \
            --names "${PREFIX}-tg" \
            --query "TargetGroups[0].TargetGroupArn" --output text 2>/dev/null || true)
          import_if_missing "module.compute.aws_lb_target_group.backend" "$TG_ARN"

          if [ -n "$ALB_ARN" ] && [ "$ALB_ARN" != "None" ]; then
            LISTENER_ARN=$(aws elbv2 describe-listeners \
              --load-balancer-arn "$ALB_ARN" \
              --query "Listeners[?Port==\`80\`].ListenerArn|[0]" \
              --output text 2>/dev/null || true)
            import_if_missing "module.compute.aws_lb_listener.http" "$LISTENER_ARN"
          fi

          import_if_missing "module.compute.aws_autoscaling_group.backend" \
            "${PREFIX}-asg"
          import_if_missing "module.compute.aws_autoscaling_policy.scale_out" \
            "${PREFIX}-asg/${PREFIX}-scale-out"

          # ── Storage ─────────────────────────────────────────────────────────
          import_if_missing "module.storage.aws_ecr_repository.backend" \
            "muchtodo-backend"
          import_if_missing "module.storage.aws_ecr_lifecycle_policy.backend" \
            "muchtodo-backend"
          import_if_missing "module.storage.aws_s3_bucket.frontend" \
            "${PREFIX}-frontend"
          import_if_missing "module.storage.aws_s3_bucket_versioning.frontend" \
            "${PREFIX}-frontend"
          import_if_missing "module.storage.aws_s3_bucket_public_access_block.frontend" \
            "${PREFIX}-frontend"
          import_if_missing "module.storage.aws_s3_bucket_website_configuration.frontend" \
            "${PREFIX}-frontend"
          import_if_missing "module.storage.aws_s3_bucket_policy.frontend" \
            "${PREFIX}-frontend"

          OAC_ID=$(aws cloudfront list-origin-access-controls \
            --query "OriginAccessControlList.Items[?Name=='${PREFIX}-oac'].Id" \
            --output text 2>/dev/null || true)
          import_if_missing "module.storage.aws_cloudfront_origin_access_control.frontend" "$OAC_ID"

          CF_ID=$(aws cloudfront list-distributions \
            --query "DistributionList.Items[?Comment=='${PREFIX} frontend'].Id|[0]" \
            --output text 2>/dev/null || true)
          import_if_missing "module.storage.aws_cloudfront_distribution.frontend" "$CF_ID"

          import_if_missing "module.storage.aws_elasticache_subnet_group.redis" \
            "${PREFIX}-redis-subnet-grp"
          import_if_missing "module.storage.aws_elasticache_parameter_group.redis" \
            "${PREFIX}-redis-params"
          import_if_missing "module.storage.aws_elasticache_cluster.redis" \
            "${PREFIX}-redis"

          # ── Monitoring ──────────────────────────────────────────────────────
          import_if_missing "module.monitoring.aws_cloudwatch_log_group.backend" \
            "/muchtodo/backend"
          import_if_missing "module.monitoring.aws_cloudwatch_log_group.frontend" \
            "/muchtodo/frontend"

          SNS_ARN=$(aws sns list-topics \
            --query "Topics[?ends_with(TopicArn,'${PREFIX}-alerts')].TopicArn|[0]" \
            --output text 2>/dev/null || true)
          import_if_missing "module.monitoring.aws_sns_topic.alerts" "$SNS_ARN"

          if [ -n "$SNS_ARN" ] && [ "$SNS_ARN" != "None" ]; then
            SUB_ARN=$(aws sns list-subscriptions-by-topic \
              --topic-arn "$SNS_ARN" \
              --query "Subscriptions[?Protocol=='email'].SubscriptionArn|[0]" \
              --output text 2>/dev/null || true)
            import_if_missing "module.monitoring.aws_sns_topic_subscription.email" "$SUB_ARN"
          fi

          import_if_missing "module.monitoring.aws_cloudwatch_metric_alarm.high_cpu" \
            "${PREFIX}-high-cpu"
          import_if_missing "module.monitoring.aws_cloudwatch_metric_alarm.alb_5xx" \
            "${PREFIX}-alb-5xx"
          import_if_missing "module.monitoring.aws_cloudwatch_metric_alarm.alb_latency" \
            "${PREFIX}-alb-latency"
          import_if_missing "module.monitoring.aws_cloudwatch_metric_alarm.redis_cpu" \
            "${PREFIX}-redis-cpu"
          import_if_missing "module.monitoring.aws_cloudwatch_dashboard.main" \
            "${PREFIX}-dashboard"

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan -out=tfplan -no-color 2>&1 | tee plan_output.txt
          echo "exitcode=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      - name: Post Plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('${{ env.WORKING_DIR }}/plan_output.txt', 'utf8');
            const maxLen = 65000;
            const truncated = plan.length > maxLen
              ? plan.substring(0, maxLen) + '\n\n... (truncated)'
              : plan;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Terraform Plan\n\`\`\`hcl\n${truncated}\n\`\`\``
            });

      - name: Upload Plan
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: ${{ env.WORKING_DIR }}/tfplan
          retention-days: 1

  apply:
    name: Apply
    runs-on: ubuntu-latest
    needs: plan
    # Apply only on manual workflow_dispatch with action=apply
    # Never auto-apply on push — infrastructure changes require explicit human approval
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply'
    environment: production
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION || 'eu-north-1' }}
      TF_VAR_mongo_uri: ${{ secrets.TF_VAR_MONGO_URI }}
      TF_VAR_jwt_secret_key: ${{ secrets.TF_VAR_JWT_SECRET_KEY }}
      TF_VAR_redis_password: ${{ secrets.TF_VAR_REDIS_PASSWORD }}
      TF_VAR_alert_email: ${{ secrets.ALERT_EMAIL }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init

      - name: Download Plan
        uses: actions/download-artifact@v4
        with:
          name: terraform-plan
          path: ${{ env.WORKING_DIR }}

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

      - name: Output Summary
        run: |
          echo "## Infrastructure Deployed" >> $GITHUB_STEP_SUMMARY
          terraform output -no-color >> $GITHUB_STEP_SUMMARY
