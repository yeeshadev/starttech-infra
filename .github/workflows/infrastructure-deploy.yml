name: Infrastructure Deploy

on:
  push:
    branches: [master, main]
    paths:
      - 'terraform/**'
      - '.github/workflows/infrastructure-deploy.yml'
  pull_request:
    branches: [master, main]
    paths:
      - 'terraform/**'
  workflow_dispatch:
    inputs:
      action:
        description: 'Terraform action to run'
        required: true
        default: 'plan'
        type: choice
        options: [plan, apply, destroy]

permissions:
  contents: read
  pull-requests: write

env:
  TF_VERSION: '1.9.0'
  WORKING_DIR: './terraform'
  STATE_BUCKET: 'muchtodo-terraform-state'
  STATE_TABLE: 'muchtodo-terraform-locks'
  STATE_REGION: 'eu-north-1'

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION || 'eu-north-1' }}
        run: terraform init -backend=false

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        run: terraform validate

  plan:
    name: Plan
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'pull_request' || github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION || 'eu-north-1' }}
      TF_VAR_mongo_uri: ${{ secrets.TF_VAR_MONGO_URI }}
      TF_VAR_jwt_secret_key: ${{ secrets.TF_VAR_JWT_SECRET_KEY }}
      TF_VAR_redis_password: ${{ secrets.TF_VAR_REDIS_PASSWORD }}
      TF_VAR_alert_email: ${{ secrets.ALERT_EMAIL }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Bootstrap state backend
        run: |
          # Create S3 bucket (idempotent)
          if aws s3api head-bucket --bucket "$STATE_BUCKET" 2>/dev/null; then
            echo "State bucket already exists: $STATE_BUCKET"
          else
            aws s3api create-bucket \
              --bucket "$STATE_BUCKET" \
              --region "$STATE_REGION" \
              --create-bucket-configuration LocationConstraint="$STATE_REGION"
            aws s3api put-bucket-versioning \
              --bucket "$STATE_BUCKET" \
              --versioning-configuration Status=Enabled
            aws s3api put-bucket-encryption \
              --bucket "$STATE_BUCKET" \
              --server-side-encryption-configuration \
              '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}'
            echo "Created state bucket: $STATE_BUCKET"
          fi

          # Create DynamoDB lock table (idempotent)
          if aws dynamodb describe-table --table-name "$STATE_TABLE" --region "$STATE_REGION" 2>/dev/null; then
            echo "Lock table already exists: $STATE_TABLE"
          else
            aws dynamodb create-table \
              --table-name "$STATE_TABLE" \
              --attribute-definitions AttributeName=LockID,AttributeType=S \
              --key-schema AttributeName=LockID,KeyType=HASH \
              --billing-mode PAY_PER_REQUEST \
              --region "$STATE_REGION"
            echo "Created lock table: $STATE_TABLE"
          fi

      - name: Terraform Init
        run: terraform init

      - name: Import orphaned resources
        run: |
          import_if_missing() {
            local resource="$1"
            local id="$2"
            if terraform state show "$resource" >/dev/null 2>&1; then
              echo "Already in state: $resource"
            else
              echo "Importing: $resource (id=$id)"
              terraform import "$resource" "$id"
            fi
          }

          import_if_missing \
            "module.compute.aws_iam_role.ec2" \
            "muchtodo-production-ec2-role"

          OAC_ID=$(aws cloudfront list-origin-access-controls \
            --query "OriginAccessControlList.Items[?Name=='muchtodo-production-oac'].Id" \
            --output text 2>/dev/null || true)
          if [ -n "$OAC_ID" ] && [ "$OAC_ID" != "None" ]; then
            import_if_missing \
              "module.storage.aws_cloudfront_origin_access_control.frontend" \
              "$OAC_ID"
          fi

          import_if_missing \
            "module.storage.aws_elasticache_subnet_group.redis" \
            "muchtodo-production-redis-subnet-grp"

          import_if_missing \
            "module.storage.aws_elasticache_parameter_group.redis" \
            "muchtodo-production-redis-params"

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan -out=tfplan -no-color 2>&1 | tee plan_output.txt
          echo "exitcode=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      - name: Post Plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('${{ env.WORKING_DIR }}/plan_output.txt', 'utf8');
            const maxLen = 65000;
            const truncated = plan.length > maxLen
              ? plan.substring(0, maxLen) + '\n\n... (truncated)'
              : plan;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Terraform Plan\n\`\`\`hcl\n${truncated}\n\`\`\``
            });

      - name: Upload Plan
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: ${{ env.WORKING_DIR }}/tfplan
          retention-days: 1

  apply:
    name: Apply
    runs-on: ubuntu-latest
    needs: plan
    # Apply only on manual workflow_dispatch with action=apply
    # Never auto-apply on push — infrastructure changes require explicit human approval
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply'
    environment: production
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION || 'eu-north-1' }}
      TF_VAR_mongo_uri: ${{ secrets.TF_VAR_MONGO_URI }}
      TF_VAR_jwt_secret_key: ${{ secrets.TF_VAR_JWT_SECRET_KEY }}
      TF_VAR_redis_password: ${{ secrets.TF_VAR_REDIS_PASSWORD }}
      TF_VAR_alert_email: ${{ secrets.ALERT_EMAIL }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init

      - name: Download Plan
        uses: actions/download-artifact@v4
        with:
          name: terraform-plan
          path: ${{ env.WORKING_DIR }}

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

      - name: Output Summary
        run: |
          echo "## Infrastructure Deployed" >> $GITHUB_STEP_SUMMARY
          terraform output -no-color >> $GITHUB_STEP_SUMMARY
